name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test map resource tooling
        run: python3 -m unittest test_map_down.py
      - name: Check save parser sources
        run: python3 -m py_compile sav_cli/*.py script/build_sav_cli.py
      - name: Test save editing helpers
        run: |
          (
            cd sav_cli
            python3 -m unittest \
              world_types_test.py \
              pal_editor_test.py \
              inventory_editor_test.py \
              player_editor_test.py \
              player_save_editor_test.py \
              world_option_editor_test.py
          )
          python3 -m unittest script/build_sav_cli_test.py
      - name: Test backend packages
        run: go test ./...
      - name: Vet backend packages
        run: go vet ./...
      - name: Scan backend dependencies
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Verify official RCON templates
        run: node ../script/check_rcon_templates.mjs
      - name: Audit frontend dependencies
        run: pnpm audit --audit-level low --registry=https://registry.npmjs.org/
      - name: Lint frontend
        run: pnpm lint
      - name: Build frontend
        run: pnpm build
