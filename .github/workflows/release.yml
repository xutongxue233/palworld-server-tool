name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  GO_VERSION_FILE: go.mod
  NODE_VERSION: "24"
  PNPM_VERSION: "11.5.3"
  PYTHON_VERSION: "3.13"
  RSRC_VERSION: "v0.10.2"

jobs:
  embedded-assets:
    name: Build embedded web and map assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Refresh map resources
        run: python3 map_down.py
      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Build frontend
        working-directory: web
        run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: embedded-assets
          if-no-files-found: error
          retention-days: 1
          path: |
            assets
            favicon.ico
            index.html
            map

  windows:
    name: Build Windows x86_64
    needs: embedded-assets
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: embedded-assets
          path: .
      - name: Install sav_cli build dependencies
        run: >-
          python -m pip install
          pyinstaller==6.16.0
          requests==2.32.5
          orjson==3.11.8
          setuptools==80.9.0
          wheel==0.45.1
      - name: Build Windows package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $tag = "${{ github.ref_name }}"
          $packageDir = "release/windows_x86_64"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          python script/build_sav_cli.py --output "$packageDir/sav_cli.exe" --cache-dir .cache/sav-cli-build
          go run "github.com/akavel/rsrc@${{ env.RSRC_VERSION }}" -arch amd64 -ico build/windows/pst.ico -o rsrc_windows_amd64.syso
          go run "github.com/akavel/rsrc@${{ env.RSRC_VERSION }}" -arch amd64 -ico build/windows/pst.ico -o cmd/pst-agent/rsrc_windows_amd64.syso
          go build -tags assets -ldflags "-s -w -X main.version=$tag" -o "$packageDir/pst.exe" .
          go build -ldflags "-s -w" -o "release/pst-agent_${tag}_windows_x86_64.exe" ./cmd/pst-agent
          Copy-Item example/config.yaml "$packageDir/config.yaml"
          Copy-Item script/start.bat "$packageDir/start.bat"
          Copy-Item THIRD_PARTY_NOTICES.md "$packageDir/THIRD_PARTY_NOTICES.md"
          $requiredFiles = @(
            "pst.exe",
            "sav_cli.exe",
            "sav_cli-GPL-3.0.txt",
            "THIRD_PARTY_NOTICES.md",
            "config.yaml",
            "start.bat"
          )
          foreach ($requiredFile in $requiredFiles) {
            if (-not (Test-Path -LiteralPath "$packageDir/$requiredFile" -PathType Leaf)) {
              throw "Windows release package is missing $requiredFile"
            }
          }
          $archivePath = "release/pst_${tag}_windows_x86_64.zip"
          Compress-Archive -Path "$packageDir/*" -DestinationPath $archivePath -CompressionLevel Optimal
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead($archivePath)
          try {
            $entries = @($archive.Entries | ForEach-Object { $_.FullName })
            foreach ($requiredFile in $requiredFiles) {
              if ($entries -notcontains $requiredFile) {
                throw "Windows release archive is missing $requiredFile"
              }
            }
          } finally {
            $archive.Dispose()
          }
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86-64
          if-no-files-found: error
          path: |
            release/*.zip
            release/pst-agent_*.exe

  linux:
    name: Build Linux ${{ matrix.release_arch }}
    needs: embedded-assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            goarch: amd64
            release_arch: x86_64
          - runner: ubuntu-24.04-arm
            goarch: arm64
            release_arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: embedded-assets
          path: .
      - name: Install native and Python build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          python -m pip install \
            pyinstaller==6.16.0 \
            requests==2.32.5 \
            orjson==3.11.8 \
            setuptools==80.9.0 \
            wheel==0.45.1
      - name: Build Linux package
        env:
          GOARCH: ${{ matrix.goarch }}
          RELEASE_ARCH: ${{ matrix.release_arch }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          package_dir="release/linux_${RELEASE_ARCH}"
          mkdir -p "${package_dir}"
          python script/build_sav_cli.py --output "${package_dir}/sav_cli" --cache-dir .cache/sav-cli-build
          CGO_ENABLED=0 GOOS=linux GOARCH="${GOARCH}" go build -tags assets -ldflags="-s -w -X main.version=${RELEASE_TAG}" -o "${package_dir}/pst" .
          CGO_ENABLED=0 GOOS=linux GOARCH="${GOARCH}" go build -ldflags="-s -w" -o "release/pst-agent_${RELEASE_TAG}_linux_${RELEASE_ARCH}" ./cmd/pst-agent
          cp example/config.yaml "${package_dir}/config.yaml"
          cp script/start.sh "${package_dir}/start.sh"
          cp THIRD_PARTY_NOTICES.md "${package_dir}/THIRD_PARTY_NOTICES.md"
          chmod +x "${package_dir}/pst" "${package_dir}/sav_cli" "${package_dir}/start.sh" "release/pst-agent_${RELEASE_TAG}_linux_${RELEASE_ARCH}"
          required_files=(pst sav_cli sav_cli-GPL-3.0.txt THIRD_PARTY_NOTICES.md config.yaml start.sh)
          for required_file in "${required_files[@]}"; do
            test -f "${package_dir}/${required_file}"
          done
          archive_path="release/pst_${RELEASE_TAG}_linux_${RELEASE_ARCH}.tar.gz"
          tar -C "${package_dir}" -czf "${archive_path}" .
          entries_path="${archive_path}.entries"
          tar -tzf "${archive_path}" > "${entries_path}"
          for required_file in "${required_files[@]}"; do
            grep -Fxq "./${required_file}" "${entries_path}"
          done
          rm -f "${entries_path}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.release_arch }}
          if-no-files-found: error
          path: |
            release/*.tar.gz
            release/pst-agent_*

  publish:
    name: Publish GitHub Release
    needs:
      - windows
      - linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true
      - name: Generate checksums
        working-directory: release
        run: sha256sum pst_* pst-agent_* > SHA256SUMS.txt
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Palworld Server Tool ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            release/pst_*.zip
            release/pst_*.tar.gz
            release/pst-agent_*
            release/SHA256SUMS.txt
