palworld:
  # Local PalWorldSettings.ini path. Required for direct edits in the Web UI.
  config_path: ""
  control:
    # disabled, process, docker, systemd, or windows_service
    mode: "disabled"
    # Executable path, container name, systemd unit, or Windows service name.
    target: ""
    arguments: []
    working_directory: ""
    timeout: 120
web:
  password: ""
  port: 8080
  tls: false
  cert_path: ""
  key_path: ""
  public_url: ""
task:
  sync_interval: 60
  player_logging: false
  player_login_message: "Player {username} has joined the server! Current online player count: {online_num}."
  player_logout_message: "Player {username} has left the server! Current online player count: {online_num}."
automation:
  watchdog:
    # Disabled by default. Configure palworld.control before enabling.
    enabled: false
    # Manual Stop changes this to false in pst.db so the watchdog does not fight intentional downtime.
    desired_running: true
    check_interval_seconds: 30
    failure_threshold: 3
    restart_cooldown_seconds: 120
    max_recovery_attempts: 3
    startup_grace_seconds: 90
  notification:
    enabled: false
    # generic or discord. Settings can also be managed from the authenticated Web UI.
    provider: "generic"
    webhook_url: ""
    # Optional HMAC-SHA256 secret for generic webhooks. Never returned by the API.
    secret: ""
    events:
      - "task.failed"
      - "watchdog.unhealthy"
      - "watchdog.recovered"
      - "watchdog.recovery_failed"
    timeout_seconds: 10
    # Keep false to block localhost/private-network webhook destinations and redirects.
    allow_private_network: false
steamcmd:
  # Absolute path to steamcmd.exe on Windows or steamcmd.sh/steamcmd on Linux.
  executable: ""
  # Absolute Palworld Dedicated Server install directory. App ID is fixed to 2394010.
  install_dir: ""
  # Maximum install/update duration in seconds (60-7200).
  timeout: 1800
rcon:
  address: "127.0.0.1:25575"
  password: ""
  use_base64: false
  timeout: 5
rest:
  address: "http://127.0.0.1:8212"
  username: "admin"
  password: ""
  timeout: 5
save:
  # Local Saved directory, active world directory, or Level.sav. A local path is
  # required for native backup discovery/restore and WorldOption.sav sync.
  path: "/path/to/your/Pal/Saved"
  decode_path: ""
  sync_interval: 120
  # Palworld 1.0.0 has built-in world backups. Keep 0 unless an extra PST schedule is wanted.
  backup_interval: 0
  backup_keep_days: 7
manage:
  kick_non_whitelist: false
