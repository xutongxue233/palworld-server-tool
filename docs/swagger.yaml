info:
  contact: {}
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
paths:
  /api/automation/notifications/test:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Send a test automation notification
      tags:
      - Automation
  /api/automation/runs:
    get:
      parameters:
      - description: Optional task ID
        in: query
        name: task_id
        type: string
      - description: Maximum records, up to 200
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/task.TaskRun'
            type: array
      security:
      - ApiKeyAuth: []
      summary: List automation task runs
      tags:
      - Automation
  /api/automation/settings:
    get:
      description: Return redacted automation settings; webhook tokens and HMAC secrets
        are never returned
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/task.AutomationSettingsView'
      security:
      - ApiKeyAuth: []
      summary: Get watchdog and notification settings
      tags:
      - Automation
    put:
      consumes:
      - application/json
      description: Persist validated settings; empty credentials keep existing values
        unless their clear flag is set
      parameters:
      - description: Automation settings
        in: body
        name: settings
        required: true
        schema:
          $ref: '#/definitions/task.AutomationSettingsUpdate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/task.AutomationSettingsView'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update watchdog and notification settings
      tags:
      - Automation
  /api/automation/status:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/task.AutomationStatus'
      security:
      - ApiKeyAuth: []
      summary: Get automation runtime status
      tags:
      - Automation
  /api/automation/tasks:
    get:
      description: List persisted allowlisted maintenance tasks with their next and
        most recent runs
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/task.ScheduledTaskView'
            type: array
        "401":
          description: Unauthorized
          schema:
